name: Run Tests

on:
  push:
    branches:
      - dev
      - main

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

      - name: Notify Discord
        if: always()
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -d '{"content": "Tests run completed for branch main with status: ${{ job.status }}"}' \
          YOUR_DISCORD_WEBHOOK_URL
