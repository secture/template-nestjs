name: Validate PR

on:
  pull_request:
    branches:
      - dev
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    
    env:
      NODE_VERSION: '22'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Run Lint-Staged
        run: npx lint-staged

      - name: Run Tests
        run: npm test

      - name: Notify Discord
        if: always()
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -d '{"content": "Validation completed for PR #${{ github.event.pull_request.number }} with status: ${{ job.status }}"}' \
          ${{ secrets.DISCORD_WEBHOOK_URL }}

